<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YidStore</title>
    <link id="appFavicon" rel="icon" type="image/png" href="dark_icon.png">
    <link id="appAppleTouch" rel="apple-touch-icon" href="dark_icon.png">
    <meta id="appThemeColor" name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;

            /* Theme */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --dim: #94a3b8;

            /* Surfaces & borders */
            --border: #334155;
            --hover-bg: #334155;
            --btn-hover: rgba(255, 255, 255, 0.1);
            --soft: rgba(255, 255, 255, 0.05);
            --soft-hover: rgba(255, 255, 255, 0.1);
            --divider: rgba(255, 255, 255, 0.06);

            /* Code / inputs */
            --input-bg: #0f172a;
            --code-bg: #0f172a;

            --glow: rgba(0, 210, 255, 0.2);
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --grad: linear-gradient(135deg, #00d2ff, #3a7bd5);
        }

        /* Light theme */
        html[data-theme="light"] {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #0f172a;
            --dim: #475569;

            --border: #e2e8f0;
            --hover-bg: #f1f5f9;
            --btn-hover: rgba(15, 23, 42, 0.08);
            --soft: rgba(15, 23, 42, 0.05);
            --soft-hover: rgba(15, 23, 42, 0.08);
            --divider: rgba(15, 23, 42, 0.08);

            --input-bg: #f1f5f9;
            --code-bg: #f1f5f9;

            --glow: rgba(58, 123, 213, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        html.modal-open,
        body.modal-open {
            overflow: hidden;
            height: 100%;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: 0.5rem 0;
            margin: -0.5rem 0 1rem 0;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .logo-img {
            height: 22px;
            width: auto;
            display: inline-block;
            border-radius: 6px;
        }

        .store-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        #headerLogoFallback {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            line-height: 1;
        }

        .store-title {
            margin-left: 0.1rem;
        }

        /* Material 3 theme switch inside menu */
        .dropdown-theme {
            padding: 0.7rem 1rem;
            cursor: default;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
        }

        .dropdown-theme:hover {
            background: var(--hover-bg);
        }

        .dropdown-theme .label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text);
        }

        .m3-switch {
            position: relative;
            width: 52px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--soft);
            display: inline-flex;
            align-items: center;
            padding: 0 4px;
            cursor: pointer;
            outline: none;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            flex: 0 0 auto;
        }

        .m3-switch:focus-visible {
            box-shadow: 0 0 0 3px var(--glow);
        }

        .m3-switch .icons {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            pointer-events: none;
            font-size: 14px;
        }

        .m3-switch .icons .sun {
            color: var(--warning);
            opacity: 0.95;
        }

        .m3-switch .icons .moon {
            color: var(--dim);
            opacity: 0.9;
        }

        .m3-switch .thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--grad);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            transform: translateX(0);
            transition: transform 0.22s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease;
        }

        /* Dark mode => thumb on right, moon highlighted */
        .m3-switch.is-dark .thumb {
            transform: translateX(20px);
        }

        .m3-switch.is-dark .icons .sun {
            opacity: 0.45;
        }

        .m3-switch.is-dark .icons .moon {
            color: var(--primary);
            opacity: 1;
        }


        .logo-desc {
            font-size: 0.75rem;
            color: var(--dim);
            font-weight: 400;
        }

        .powered-by {
            font-size: 0.7rem;
            color: var(--dim);
            text-align: right;
            line-height: 1.4;
        }

        .powered-by a {
            color: var(--primary);
            text-decoration: none;
        }

        .powered-by a:hover {
            text-decoration: underline;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 220px;
            min-width: 150px;
        }

        .search-box input {
            width: 100%;
            padding: 0.5rem 0.8rem 0.5rem 2.2rem;
            border-radius: 50px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            outline: none;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--glow);
        }

        .search-box i {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dim);
            font-size: 0.9rem;
        }

        select {
            padding: 0.5rem 0.8rem;
            border-radius: 50px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            outline: none;
            font-size: 0.8rem;
            max-width: 130px;
        }

        .bulk-bar {
            background: var(--primary);
            color: #000;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.85rem;
            animation: slideDown 0.3s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .menu-container {
            position: relative;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 50%;
            transition: 0.3s;
        }

        .btn-icon:hover {
            background: var(--btn-hover);
        }

        .dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 200px;
            display: none;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .dropdown div {
            padding: 0.7rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .dropdown div:hover {
            background: var(--hover-bg);
            color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .grid.list-view {
            grid-template-columns: 1fr;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.2rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card.selected {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.05);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--grad);
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover::after {
            opacity: 1;
        }

        .list-row {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 0.8rem 1rem;
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr) auto;
            gap: 0.8rem;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .list-row:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .list-row.selected {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.05);
        }

        .list-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .list-title .title-text {
            flex: 1 1 240px;
            min-width: 0;
            word-break: normal;
            overflow-wrap: normal;
            white-space: normal;
        }

        .list-meta {
            color: var(--dim);
            font-size: 0.8rem;
            margin-top: 0.2rem;
        }

        .list-actions {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .card-check {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            font-size: 1.3rem;
            color: var(--primary);
            display: none;
        }

        .card.selected .card-check {
            display: block;
        }

        /* Select mode styles */
        .select-checkbox {
            position: absolute;
            top: 0.8rem;
            left: 0.8rem;
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: 0.2s;
        }

        .select-checkbox:hover {
            border-color: var(--primary);
        }

        .select-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .select-checkbox.checked::after {
            content: '\F012C';
            font-family: 'Material Design Icons';
            color: #000;
            font-size: 14px;
        }

        body.select-mode .select-checkbox {
            display: flex;
        }

        body.select-mode .card-check {
            display: none !important;
        }

        /* List row select checkbox */
        .list-select-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .list-select-checkbox:hover {
            border-color: var(--primary);
        }

        .list-select-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .list-select-checkbox.checked::after {
            content: '\F012C';
            font-family: 'Material Design Icons';
            color: #000;
            font-size: 14px;
        }

        body.select-mode .list-select-checkbox {
            display: flex;
        }

        body.select-mode .list-row {
            grid-template-columns: 22px 48px minmax(0, 1fr) auto;
        }

        .type-tag {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .tag-int {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
        }

        .tag-card {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .tag-blue {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }

        .badge {
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 50px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .badge-update {
            background: rgba(234, 179, 8, 0.1);
            color: var(--warning);
            border-color: rgba(234, 179, 8, 0.2);
        }

        .badge-inst {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border-color: rgba(34, 197, 94, 0.2);
        }

        .badge-restart {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
            border-color: rgba(249, 115, 22, 0.2);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .card-title span {
            word-break: break-word;
        }

        .card-desc {
            color: var(--dim);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.8rem;
            margin-top: auto;
            border-top: 1px solid var(--divider);
        }

        .card-actions {
            display: flex;
            gap: 0.3rem;
        }

        .action-btn {
            background: var(--soft);
            border: none;
            color: var(--dim);
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--btn-hover);
            color: var(--text);
        }

        .action-btn.hide-btn:hover {
            color: var(--danger);
        }

        .btn {
            padding: 0.7rem 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-p {
            background: var(--grad);
            color: #fff;
        }

        .btn-p:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px var(--glow);
        }

        .btn-p:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-o {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-o:hover {
            background: var(--hover-bg);
        }

        .btn-dark {
            background: #000;
            color: #fff;
        }

        .btn-refresh {
            padding: 0.5rem 0.8rem;
            font-size: 0.75rem;
        }

        #modal,
        #customModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            z-index: 1000;
            padding: 0.5rem;
            justify-content: center;
            align-items: center;
        }

        .modal-c {
            background: var(--card);
            width: 100%;
            max-width: 900px;
            height: 95vh;
            max-height: 95vh;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: zoom 0.3s;
        }

        #customModal .modal-c {
            height: auto;
            max-width: 400px;
            max-height: 90vh;
        }

        .modal-h {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-h h2 {
            font-size: 1.1rem;
            word-break: break-word;
        }

        .modal-b {
            padding: 1.2rem;
            overflow-y: auto;
            flex-grow: 1;
            line-height: 1.7;
            color: var(--text);
            font-size: 0.9rem;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .modal-b::-webkit-scrollbar {
            width: 8px;
        }

        .modal-b::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 12px;
        }

        .modal-b::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 12px;
        }

        .modal-b {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        .modal-b.scrolling::-webkit-scrollbar-track {
            background: var(--divider);
        }

        .modal-b.scrolling::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00d2ff, #3a7bd5);
        }

        .modal-b.scrolling {
            scrollbar-color: #3a7bd5 rgba(255, 255, 255, 0.06);
        }

        .modal-b::-webkit-scrollbar-button {
            display: none;
            width: 0;
            height: 0;
        }

        .modal-f {
            padding: 1rem 1.2rem;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .version-wrap {
            width: 100%;
        }

        .version-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.95rem;
        }

        .modal-logo {
            display: none;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.9rem;
        }

        .modal-logo img {
            max-height: 110px;
            max-width: 360px;
            object-fit: contain;
        }

        .modal-top {
            margin-bottom: 1rem;
        }

        .modal-top-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .modal-top-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 0;
        }

        .modal-top-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.15;
        }

        .modal-top-author {
            color: var(--dim);
            font-size: 0.85rem;
            margin-top: 0.15rem;
        }

        .modal-divider {
            height: 1px;
            width: 100%;
            background: var(--divider);
            margin-top: 0.9rem;
        }

        @media (max-width: 560px) {
            .modal-top-row {
                flex-direction: column;
            }

            .modal-top-text {
                align-items: center;
                text-align: center;
            }
        }

        .modal-f {
            align-items: center;
        }

        .version-wrap {
            width: auto;
            min-width: 360px;
            flex: 1 1 auto;
        }

        .version-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .version-select {
            min-width: 360px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--dim);
            font-size: 0.85rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            outline: none;
            font-size: 0.9rem;
        }

        .pop-o {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .pop {

        #headerIconImg,

<body>
    <div class="container">
        <header>
            <div class="logo-section">

            <div class="controls">

                <select id="filterF" onchange="apply()" title="Filter">
                    <option value="all">Filter: All</option>

                    <button class="btn-icon" onclick="toggleView()" title="Toggle View" id="viewToggleBtn"><i
                            class="mdi mdi-format-list-bulleted"></i></button>

    <div id="modal">

    <div id="customModal">

    <div id="pop-o" class="pop-o">
        <div class="pop">

            <h3 id="pt" style="font-size:1.4rem; margin-bottom:0.8rem;"></h3>
            <p id="pm" style="color:var(--dim); margin-bottom:1.5rem; line-height:1.5; font-size:0.9rem;"></p>
            <div id="pa" style="display:flex; justify-content:center; gap:0.8rem; flex-wrap:wrap;"></div>
        </div>

    <script>
        let items = [];
        const THEME_KEY = 'yidstore_theme';
        const CACHE_KEY = 'yidstore_cache';
        const CACHE_DURATION = 2 * 60 * 60 * 1000; // 2 hours in milliseconds
        const LIVE_SYNC_INTERVAL = 15 * 1000; // lightweight status sync
        const OPTIMISTIC_RESTART_MS = 10 * 60 * 1000; // immediate pending restart after install/update

        function formatReleaseDate(dateString) {
            if (!dateString) return '';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return '';
                return date.toLocaleDateString(undefined, {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch (e) {
                return '';
            }
        }

        function getCachedData() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (!cached) return null;
                const { data, timestamp } = JSON.parse(cached);
                const age = Date.now() - timestamp;
                if (age > CACHE_DURATION) {
                    localStorage.removeItem(CACHE_KEY);
                    return null;
                }
                return { data, age };
            } catch (e) {
                localStorage.removeItem(CACHE_KEY);
                return null;
            }
        }

        function setCachedData(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    data: data,
                    timestamp: Date.now()
                }));
            } catch (e) {
                // Ignore storage errors
            }
        }

        function getCacheAgeText(ageMs) {
            const minutes = Math.floor(ageMs / 60000);
            if (minutes < 1) return 'just now';
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            return `${hours}h ${minutes % 60}m ago`;
        }

        function getInstalledBadge(installSource, needsRestart = false, itemType = 'integration') {
            // Only integrations need restart - cards and blueprints just need reload
            if (needsRestart && itemType === 'integration') {
                return '<span class="badge badge-restart">Restart Required</span>';
            }
            switch (installSource) {
                case 'hacs':
                    return '<span class="badge badge-inst">Installed by HACS</span>';
                case 'manual':
                    return '<span class="badge badge-inst">Manually installed</span>';
                case 'yidstore':
                default:
                    return '<span class="badge badge-inst">Installed</span>';
            }
        }

        // Requires restart tracking (server-driven)
        let requiresRestartSet = new Set();
        let optimisticRestartUntil = new Map();
        let autoReloadInterval = null;
        let liveSyncInterval = null;
        let hasCompletedInitialLoad = false;

        // Normalize key for restart set comparison (handle dashes vs underscores)
        function normalizeRestartKey(key) {
            return key.toLowerCase().replace(/-/g, '_');
        }

        function needsRestart(owner, repo) {
            const key = normalizeRestartKey(`${owner}/${repo}`);
            // 1) Server/sensor truth
            for (const k of requiresRestartSet) {
                if (normalizeRestartKey(k) === key) return true;
            }
            // 2) Short-lived optimistic state right after install/update
            const expiry = optimisticRestartUntil.get(key) || 0;
            if (expiry > Date.now()) return true;
            if (expiry > 0) optimisticRestartUntil.delete(key);
            return false;
        }

        function loadRestartSet() {
            requiresRestartSet = new Set();
        }

        function saveRestartSet() {
            // No-op: restart state is owned by backend status API.
        }

        function addToRestartSet(owner, repo) {
            optimisticRestartUntil.set(
                normalizeRestartKey(`${owner}/${repo}`),
                Date.now() + OPTIMISTIC_RESTART_MS
            );
            saveRestartSet();
        }

        async function refreshDashboard() {
            // Quick sync with integration - just update status without full reload
            try {
                const res = await fetch('/api/yidstore/status');
                if (!res.ok) {
                    console.log('Status API failed:', res.status);
                    // Even if status fails, still apply with current data
                    apply();
                    return;
                }
                const data = await res.json();
                // Server is source of truth for restart status.
                requiresRestartSet = new Set(data.requires_restart_list || []);
                // If server confirms restart-needed, clear optimistic override for that repo.
                for (const k of requiresRestartSet) {
                    optimisticRestartUntil.delete(normalizeRestartKey(k));
                }

                // Update items with new status from server
                for (const [key, status] of Object.entries(data.status || {})) {
                    const [owner, repo] = key.split('/');
                    // Normalize for matching (handle dashes vs underscores)
                    const normalizedOwner = owner.toLowerCase().replace(/-/g, '_');
                    const normalizedRepo = repo.toLowerCase().replace(/-/g, '_');
                    const item = items.find(x =>
                        x.owner.toLowerCase().replace(/-/g, '_') === normalizedOwner &&
                        x.repo_name.toLowerCase().replace(/-/g, '_') === normalizedRepo
                    );
                    if (item) {
                        item.is_installed = status.is_installed;
                        item.install_source = status.install_source;
                        // Only update update_available if server says it's not installed or has update
                        // This prevents losing the "no update" state we set locally after installing
                        if (status.update_available !== undefined) {
                            item.update_available = status.update_available;
                        }
                    }
                }

                // Update cache with current items
                setCachedData(items);
                apply();

                // Update modal restart badge if modal is open
                updateModalRestartBadge();
            } catch (e) {
                console.log('Refresh failed:', e);
                // Still apply current state
                apply();
            }
        }

        function updateModalRestartBadge() {
            const modalTop = document.querySelector('.modal-top[data-owner][data-repo]');
            const badge = document.getElementById('modalRestartBadge');
            if (!modalTop || !badge) return;

            const owner = modalTop.dataset.owner;
            const repo = modalTop.dataset.repo;
            const type = modalTop.dataset.type;
            const restartNeeded = type === 'integration' && needsRestart(owner, repo);

            if (restartNeeded) {
                badge.className = 'badge badge-restart';
                badge.style.display = '';
                badge.style.marginLeft = '0.5rem';
                badge.textContent = 'Restart Required';
            } else {
                badge.style.display = 'none';
            }
        }

        function startAutoReload() {
            if (autoReloadInterval) clearInterval(autoReloadInterval);
            // Full reload every 2 hours
            autoReloadInterval = setInterval(() => {
                fullReload();
            }, CACHE_DURATION);
        }

        function stopAutoReload() {
            if (autoReloadInterval) {
                clearInterval(autoReloadInterval);
                autoReloadInterval = null;
            }
        }

        function startLiveSync() {
            if (liveSyncInterval) clearInterval(liveSyncInterval);
            liveSyncInterval = setInterval(() => {
                if (document.visibilityState === 'visible') refreshDashboard();
            }, LIVE_SYNC_INTERVAL);
        }

        function stopLiveSync() {
            if (liveSyncInterval) {
                clearInterval(liveSyncInterval);
                liveSyncInterval = null;
            }
        }

        function getSavedTheme() {
            const t = (localStorage.getItem(THEME_KEY) || 'dark').toLowerCase();
            return (t === 'light') ? 'light' : 'dark';
        }

        function setTheme(theme, persist = true) {
            const t = (theme === 'light') ? 'light' : 'dark';
            if (persist) localStorage.setItem(THEME_KEY, t);
            applyTheme(t);
        }

        function applyTheme(theme) {
            const t = (theme === 'light') ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);

            // Swap logo + icon assets (served from /yidstore_static/)
            const logoFile = (t === 'light') ? 'logo.png' : 'dark_logo.png';
            const iconFile = (t === 'light') ? 'icon.png' : 'dark_icon.png';

            const favicon = document.getElementById('appFavicon');
            if (favicon) favicon.href = iconFile;

            const apple = document.getElementById('appAppleTouch');
            if (apple) apple.href = iconFile;

            const themeColor = document.getElementById('appThemeColor');
            if (themeColor) themeColor.content = (t === 'light') ? '#f6f7fb' : '#0f172a';

            const iconImg = document.getElementById('headerIconImg');
            if (iconImg) {
                iconImg.src = iconFile;
                iconImg.style.display = 'inline-block';
            }

            const logoImg = document.getElementById('headerLogoImg');
            const logoFallback = document.getElementById('headerLogoFallback');
            if (logoImg) {
                logoImg.onload = () => {
                    logoImg.style.display = 'inline-block';
                    if (logoFallback) logoFallback.style.display = 'none';
                };
                logoImg.onerror = () => {
                    logoImg.style.display = 'none';
                    if (logoFallback) logoFallback.style.display = 'inline-flex';
                };
                logoImg.src = logoFile;
            }

            updateThemeSwitchUI(t);
            refreshBrandImages();
        }

        function updateThemeSwitchUI(theme) {
            const sw = document.getElementById('themeSwitch');
            if (!sw) return;
            const isDark = theme !== 'light';
            sw.classList.toggle('is-dark', isDark);
            sw.setAttribute('aria-checked', theme === 'light' ? 'true' : 'false');
        }

        function toggleThemeFromMenu(e) {
            const current = (document.documentElement.getAttribute('data-theme') === 'light') ? 'light' : 'dark';
            setTheme(current === 'light' ? 'dark' : 'light', true);
        }

        function initTheme() {
            // Default is dark
            setTheme(getSavedTheme(), false);

            // Keyboard toggle for accessibility
            const sw = document.getElementById('themeSwitch');
            if (sw) {
                sw.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter' || ev.key === ' ') {
                        ev.preventDefault();
                        toggleThemeFromMenu(ev);
                    }
                });
            }
        }

        // ----------------------------
        // Home Assistant Brands lookup
        // ----------------------------
        function getCurrentTheme() {
            return (document.documentElement.getAttribute('data-theme') === 'light') ? 'light' : 'dark';
        }

        function getDomainFromItem(item) {
            const raw = (item && (item.domain || item.repo_name || '')) + '';
            return raw.toLowerCase().replace(/-/g, '_').trim();
        }

        function haBrandUrl(domain, file) {
            const d = encodeURIComponent(domain || '');
            return `/api/yidstore/brands/${d}/${file}`;
        }

        function getBrandCandidates(domain, kind, fallbackUrl) {
            const t = getCurrentTheme();

            // Theme-preferred files for each kind
            const iconPrimary = (t === 'light') ? 'icon.png' : 'dark_icon.png';
            const iconSecondary = (t === 'light') ? 'dark_icon.png' : 'icon.png';

            const logoPrimary = (t === 'light') ? 'logo.png' : 'dark_logo.png';
            const logoSecondary = (t === 'light') ? 'dark_logo.png' : 'logo.png';

            const candidates = [];

            // 0) If fallback URL is a GitHub raw URL, generate theme-aware variants
            if (fallbackUrl && fallbackUrl.includes('raw.githubusercontent.com')) {
                const baseUrl = fallbackUrl.replace(/\/[^\/]+\.png$/, '/');
                if (kind === 'logo') {
                    candidates.push(baseUrl + logoPrimary);
                    candidates.push(baseUrl + logoSecondary);
                } else {
                    candidates.push(baseUrl + iconPrimary);
                    candidates.push(baseUrl + iconSecondary);
                }
                // Also try the direct icon.png without brand folder for some repos
                const altBaseUrl = fallbackUrl.replace('/brand/icon.png', '/').replace('/brand/', '/');
                if (altBaseUrl !== baseUrl) {
                    candidates.push(altBaseUrl + 'icon.png');
                }
            } else if (fallbackUrl) {
                // Non-GitHub fallback URL
                candidates.push(fallbackUrl);
            }

            if (kind === 'logo') {
                // 1) Brand logo files
                candidates.push(
                    haBrandUrl(domain, logoPrimary),
                    haBrandUrl(domain, logoSecondary)
                );

                // 2) Brand icon files (fallback for logo)
                candidates.push(
                    haBrandUrl(domain, iconPrimary),
                    haBrandUrl(domain, iconSecondary)
                );
            } else {
                // Icon kind
                candidates.push(
                    haBrandUrl(domain, iconPrimary),
                    haBrandUrl(domain, iconSecondary)
                );
            }



            // De-dupe while preserving order
            const seen = new Set();
            return candidates.filter(Boolean).filter((u) => {
                if (seen.has(u)) return false;
                seen.add(u);
                return true;
            });
        }

        function brandImgLoaded(img) {
            // If there is a fallback element right after the image, hide it
            const fb = img.nextElementSibling;
            if (fb && fb.classList && fb.classList.contains('card-icon-fallback')) {
                fb.style.display = 'none';
            }
            img.style.display = 'inline-block';
            const p = img.parentElement;
            if (p && p.id === 'modalLogo') { p.style.display = 'flex'; }
        }

        function brandImgError(img) {
            const candidates = (img.dataset.candidates || '').split('|').filter(Boolean);
            const cur = img.getAttribute('src') || '';
            const idx = Math.max(0, candidates.indexOf(cur));
            const next = candidates[idx + 1];

            if (next) {
                img.src = next;
                return;
            }

            // No more candidates: hide image and show fallback if present
            img.style.display = 'none';
            const fb = img.nextElementSibling;
            if (fb) fb.style.display = 'flex';
            const p = img.parentElement;
            if (p && p.id === 'modalLogo') { p.style.display = 'none'; }
        }

        function refreshBrandImages() {
            document.querySelectorAll('img[data-brand-domain][data-brand-kind]').forEach(img => {
                const domain = img.dataset.brandDomain;
                const kind = img.dataset.brandKind;
                const fallbackUrl = img.dataset.fallbackUrl || '';
                const candidates = getBrandCandidates(domain, kind, fallbackUrl);
                if (candidates.length === 0) return;

                img.dataset.candidates = candidates.join('|');

                const desired = candidates[0];
                if ((img.getAttribute('src') || '') !== desired) {
                    img.style.display = '';
                    img.src = desired;
                }
            });
        }

        let selectedIds = new Set();
        let showHidden = false;
        let viewMode = 'grid';
        let selectMode = false;
        let lastFiltered = [];
        let collapsedSections = new Set();
        const grid = document.getElementById('grid');

        function toggleSelectMode() {
            selectMode = !selectMode;
            document.body.classList.toggle('select-mode', selectMode);
            const btn = document.getElementById('selectModeBtn');
            if (btn) {
                btn.style.background = selectMode ? 'var(--primary)' : '';
                btn.style.color = selectMode ? '#000' : '';
            }
            if (!selectMode) {
                clearSelection();
            }
            apply();
        }

        function isOverlayOpen() {
            const modal = document.getElementById('modal');
            const customModal = document.getElementById('customModal');
            const pop = document.getElementById('pop-o');
            return (modal && modal.style.display === 'flex') ||
                (customModal && customModal.style.display === 'flex') ||
                (pop && pop.style.display === 'flex');
        }

        function updateScrollLock() {
            const lock = isOverlayOpen();
            document.body.classList.toggle('modal-open', lock);
            document.documentElement.classList.toggle('modal-open', lock);
        }

        function formatName(n) {
            let s = n.startsWith('x-') ? n.substring(2) : n;
            s = s.replace(/[_-]/g, ' ');
            return s.split(' ').filter(w => w.length > 0).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        async function load(forceRefresh = false) {
            // Check cache first (unless forcing refresh)
            if (!forceRefresh) {
                const cached = getCachedData();
                if (cached) {
                    items = cached.data;
                    // Also fetch requires_restart status
                    try {
                        const statusRes = await fetch('/api/yidstore/status');
                        if (statusRes.ok) {
                            const statusData = await statusRes.json();
                            requiresRestartSet = new Set(statusData.requires_restart_list || []);
                        }
                    } catch (e) {}
                    apply();
                    updateCacheIndicator(cached.age);
                    startAutoReload();
                    startLiveSync();
                    hasCompletedInitialLoad = true;
                    return;
                }
            }

            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--dim);"><i class="mdi mdi-loading mdi-spin" style="font-size: 2.5rem; display: block; margin-bottom: 0.8rem;"></i> Loading...</div>';
            try {
                const r = await fetch('/api/yidstore/repos');
                items = await r.json();
                // Also fetch requires_restart status
                try {
                    const statusRes = await fetch('/api/yidstore/status');
                    if (statusRes.ok) {
                        const statusData = await statusRes.json();
                        requiresRestartSet = new Set(statusData.requires_restart_list || []);
                    }
                } catch (e) {}
                setCachedData(items);
                hasCompletedInitialLoad = true;
                apply();
                updateCacheIndicator(0);
                startAutoReload();
                startLiveSync();
            } catch (e) { grid.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--dim);">Error loading store.</div>'; }
        }

        async function fullReload() {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--dim);"><i class="mdi mdi-loading mdi-spin" style="font-size: 2.5rem; display: block; margin-bottom: 0.8rem;"></i> Loading...</div>';
            // Trigger backend refresh to check for updates from Gitea
            try {
                await fetch('/api/yidstore/refresh', { method: 'POST' });
            } catch (e) {}
            // Clear cache and force fresh data
            localStorage.removeItem(CACHE_KEY);
            load(true);
        }

        function triggerAutoFullReload() {
            fullReload();
        }

        function updateCacheIndicator(ageMs) {
            const refreshBtn = document.getElementById('refreshBtn');
            if (!refreshBtn) return;
            refreshBtn.innerHTML = '<i class="mdi mdi-sync"></i> Refresh';
            refreshBtn.title = 'Sync dashboard with integration';
        }

        function populateAuthorFilter(visibleItems = null) {
            const authorF = document.getElementById('authorF');
            const currentValue = authorF.value;

            // Use visible items if provided, otherwise use all items
            const itemsToCheck = visibleItems || items;

            // Get unique authors with display names - only from visible items
            const authors = new Map();
            itemsToCheck.forEach(i => {
                // Skip hidden items unless showHidden is true
                if (!showHidden && i.is_hidden) return;
                const displayName = getDisplayAuthor(i.owner, i.owner_display_name);
                if (!authors.has(i.owner)) {
                    authors.set(i.owner, displayName);
                }
            });

            // Sort authors by display name
            const sortedAuthors = Array.from(authors.entries()).sort((a, b) =>
                a[1].localeCompare(b[1])
            );

            // Rebuild options
            authorF.innerHTML = '<option value="all">All Authors</option>';
            sortedAuthors.forEach(([owner, displayName]) => {
                const opt = document.createElement('option');
                opt.value = owner;
                opt.textContent = displayName;
                authorF.appendChild(opt);
            });

            // Restore previous selection if it still exists, otherwise reset to all
            if (currentValue !== 'all' && authors.has(currentValue)) {
                authorF.value = currentValue;
            } else if (currentValue !== 'all') {
                authorF.value = 'all';
            }
        }

        async function checkUpdates() {
            // Quick refresh - sync with integration status
            await refreshDashboard();
        }

        function apply() {
            const q = document.getElementById('q').value.toLowerCase();
            const filterVal = document.getElementById('filterF').value;
            const s = document.getElementById('sort').value;
            const authorFilter = document.getElementById('authorF').value;

            // First filter by everything except author (for populating author dropdown)
            let preAuthorFiltered = items.filter(i => {
                if (!showHidden && i.is_hidden) return false;
                const matchQ = i.repo_name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q);
                const matchFilter =
                    filterVal === 'all' ||
                    (['integration', 'lovelace', 'blueprints'].includes(filterVal) && i.type === filterVal) ||
                    (filterVal === 'installed' && i.is_installed) ||
                    (filterVal === 'not_installed' && !i.is_installed) ||
                    (filterVal === 'updates' && i.update_available);
                return matchQ && matchFilter;
            });

            // Update author filter with only authors that have visible repos
            populateAuthorFilter(preAuthorFiltered);

            // Now apply author filter too
            let filtered = preAuthorFiltered.filter(i => {
                const matchAuthor = authorFilter === 'all' || i.owner === authorFilter;
                return matchAuthor;
            });

            filtered.sort((a, b) => {
                if (s === 'name') return a.repo_name.localeCompare(b.repo_name);
                if (s === 'new') return new Date(b.updated_at) - new Date(a.updated_at);
                if (s === 'upd') {
                    if (a.update_available && !b.update_available) return -1;
                    if (!a.update_available && b.update_available) return 1;
                    return a.repo_name.localeCompare(b.repo_name);
                }
                if (s === 'type') {
                    const typeOrder = { 'integration': 0, 'lovelace': 1, 'blueprints': 2 };
                    const diff = (typeOrder[a.type] || 99) - (typeOrder[b.type] || 99);
                    return diff !== 0 ? diff : a.repo_name.localeCompare(b.repo_name);
                }
                if (s === 'author') {
                    const authorA = (a.owner_display_name || a.owner).toLowerCase();
                    const authorB = (b.owner_display_name || b.owner).toLowerCase();
                    const diff = authorA.localeCompare(authorB);
                    return diff !== 0 ? diff : a.repo_name.localeCompare(b.repo_name);
                }
                return 0;
            });
            lastFiltered = filtered;
            render(filtered);
        }

        function getDisplayAuthor(owner, displayName) {
            const o = (owner || '').toString().toLowerCase();
            const d = (displayName || '').toString().toLowerCase();
            // Map admin to Joel Weiss
            if (o === 'admin' || d === 'admin') return 'Joel Weiss';
            return displayName || owner;
        }

        function createSectionHeader(title, icon, count) {
            return createSectionHeaderWithToggle(title, icon, count, null);
        }

        function createSectionHeaderWithToggle(title, icon, count, sectionKey) {
            const header = document.createElement('div');
            header.style.cssText = 'grid-column: 1/-1; padding: 1rem 0 0.5rem; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;';
            const isCollapsed = sectionKey ? collapsedSections.has(sectionKey) : false;
            const toggleIcon = isCollapsed ? 'mdi-chevron-down' : 'mdi-chevron-up';
            header.innerHTML = `
                <i class="mdi ${icon}" style="font-size: 1.2rem; color: var(--primary);"></i>
                <span style="font-size: 1.1rem; font-weight: 600;">${title}</span>
                <span style="color: var(--dim); font-size: 0.85rem;">(${count})</span>
                ${sectionKey ? `<button class="action-btn" style="margin-left:auto;" onclick="toggleSection('${sectionKey}')"><i class="mdi ${toggleIcon}"></i></button>` : ''}
            `;
            return header;
        }

        function render(data) {
            const s = document.getElementById('sort').value;
            grid.innerHTML = '';
            grid.classList.toggle('list-view', viewMode === 'list');

            if (data.length === 0) {
                if (!hasCompletedInitialLoad) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--dim);"><i class="mdi mdi-loading mdi-spin" style="font-size: 2.5rem; display: block; margin-bottom: 0.8rem;"></i> Loading...</div>';
                    return;
                }
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--dim);"><i class="mdi mdi-package-variant" style="font-size: 2.5rem; display: block; margin-bottom: 0.8rem;"></i> No items found</div>';
                return;
            }

            // Always show Updates section at top if there are updates
            const updatesItems = data.filter(i => i.update_available);
            const nonUpdatesItems = data.filter(i => !i.update_available);

            if (updatesItems.length > 0) {
                const key = 'section_updates';
                grid.appendChild(createSectionHeaderWithToggle('Updates Available', 'mdi-update', updatesItems.length, key));
                if (!collapsedSections.has(key)) {
                    updatesItems.forEach(i => grid.appendChild(viewMode === 'list' ? createListRow(i) : createCard(i)));
                }
            }

            // Render remaining items based on sort mode
            if (s === 'type' && nonUpdatesItems.length > 0) {
                // Group by type
                const types = ['integration', 'lovelace', 'blueprints'];
                const typeLabels = { 'integration': 'Integrations', 'lovelace': 'Lovelace Cards', 'blueprints': 'Blueprints' };
                const typeIcons = { 'integration': 'mdi-puzzle', 'lovelace': 'mdi-view-dashboard', 'blueprints': 'mdi-file-document-outline' };

                types.forEach(type => {
                    const typeItems = nonUpdatesItems.filter(i => i.type === type);
                    if (typeItems.length > 0) {
                        const key = `section_type_${type}`;
                        grid.appendChild(createSectionHeaderWithToggle(typeLabels[type], typeIcons[type], typeItems.length, key));
                        if (!collapsedSections.has(key)) {
                            typeItems.forEach(i => grid.appendChild(viewMode === 'list' ? createListRow(i) : createCard(i)));
                        }
                    }
                });
            } else if (s === 'author' && nonUpdatesItems.length > 0) {
                // Group by author
                const authors = new Map();
                nonUpdatesItems.forEach(i => {
                    const author = i.owner;
                    if (!authors.has(author)) {
                        authors.set(author, { displayName: getDisplayAuthor(i.owner, i.owner_display_name), items: [] });
                    }
                    authors.get(author).items.push(i);
                });

                // Sort authors by display name
                const sortedAuthors = Array.from(authors.entries()).sort((a, b) =>
                    a[1].displayName.localeCompare(b[1].displayName)
                );

                sortedAuthors.forEach(([author, data]) => {
                    const key = `section_author_${author.toLowerCase().replace(/[^a-z0-9_]+/g, '_')}`;
                    grid.appendChild(createSectionHeaderWithToggle(data.displayName, 'mdi-account', data.items.length, key));
                    if (!collapsedSections.has(key)) {
                        data.items.forEach(i => grid.appendChild(viewMode === 'list' ? createListRow(i) : createCard(i)));
                    }
                });
            } else {
                // Default rendering (no sections for non-updates)
                if (updatesItems.length > 0 && nonUpdatesItems.length > 0) {
                    const key = 'section_all';
                    grid.appendChild(createSectionHeaderWithToggle('All Packages', 'mdi-package-variant', nonUpdatesItems.length, key));
                    if (!collapsedSections.has(key)) {
                        nonUpdatesItems.forEach(i => grid.appendChild(viewMode === 'list' ? createListRow(i) : createCard(i)));
                    }
                    return;
                }
                nonUpdatesItems.forEach(i => grid.appendChild(viewMode === 'list' ? createListRow(i) : createCard(i)));
            }
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            updateBulkBar();
            apply();

        function updateBulkBar() {
            const bar = document.getElementById('bulkBar');
            const text = document.getElementById('bulkText');
            if (selectedIds.size > 0) {
                bar.style.display = 'flex';
                text.innerText = `${selectedIds.size} selected`;
